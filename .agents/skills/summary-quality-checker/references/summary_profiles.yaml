version: 0.1.0

profiles:
  ai_lead_read:
    name: AI 领读
    scene: 推荐卡片页，仅对未签约用户展示
    audience: 未签约散户用户
    hard_rules:
      - 字数 <= 80
      - 必须包含股票名称或行业名称
      - 不得出现投资建议、高危敏感词、买卖引导词
    semantic_rules:
      - 必须忠实原文
      - 必须只是提示阅读价值或研究价值，不能提示交易价值
      - 允许有钩子，但钩子不能转化为投资建议
      - 可以说“值得细读”，但不能说“值得买”“值得布局”“建议关注”
      - 需要从原文中提炼产业主线、研究价值或核心矛盾
    subjective_rules:
      - 是否有钩子效应
      - 是否有朋友提醒感
      - 是否直接、有说服力但不越界
    must_include:
      - 股票名称或行业名称
    must_not_include:
      - 建议买入
      - 建议卖出
      - 推荐
      - 值得抄底
      - 值得买
      - 值得布局
      - 抄底
      - 上车
    style:
      - 简短
      - 有阅读引导感
      - 不含交易动作暗示
    risk_focus:
      - “值得细读”可以接受，因为引导的是阅读
      - “值得买/布局/抄底”不可以接受，因为引导的是交易
      - “关注产业主线”需要结合上下文判断
    fail_examples:
      - 新能源机会来了，值得布局。
    review_examples:
      - 关注新能源产业链变化。

  key_points:
    name: 核心看点
    scene: 推荐卡片页，对未签约/已签约用户均展示
    audience: 散户用户
    hard_rules:
      - 条目数量必须在 3 到 6 之间
      - 每条文字 <= 15 字
      - 不得出现空话黑名单词
      - 不得与原研报标题字面重复
      - 不得出现高危敏感词
    semantic_rules:
      - 每条必须有实质信息
      - 不得空泛
      - 不得编造原文没有的产业逻辑、公司地位、数据或结论
      - 不得将研究看点改成投资建议
      - 内容应来自原文核心逻辑
    subjective_rules:
      - 是否按重要性排序
      - 是否足够抓重点
    must_include: []
    must_not_include:
      - 行业前景广阔
      - 未来可期
      - 值得期待
      - 持续向好
      - 发展良好
      - 空泛利好表达
    style:
      - 条目化
      - 信息密度高
    risk_focus:
      - 容易写成空话
      - 容易把“看点”写成“投资机会”
      - 排序主观，不要轻易 FAIL
    fail_examples:
      - 行业前景广阔
    review_examples:
      - 排序重要性存在争议

  one_sentence:
    name: 一句话总结
    scene: 产品主页面，签约和未签约用户均可见
    audience: 散户用户
    hard_rules:
      - 字数 <= 30
      - 不得包含套话开头
      - 必须包含研究对象
      - 不得出现高危敏感词
    semantic_rules:
      - 必须包含核心判断
      - 必须包含关键依据
      - 语气可以肯定，但不能把不确定事项写成确定收益或确定上涨
      - 不得编造原文没有的判断
      - 不得弱化风险或限定条件
    subjective_rules:
      - 是否表达足够凝练
      - 是否适合作为主页面摘要
    must_include:
      - 公司、行业或明确实体
    must_not_include:
      - 本文认为
      - 研报指出
      - 综合分析
      - 本报告
      - 综上所述
    style:
      - 单句
      - 凝练
    risk_focus:
      - “趋势明确”可以，但“必涨”“稳赚”“确定受益”不可以
      - 字数短，任何诱导交易表达都应严格处理
    fail_examples:
      - 需求改善带动利润修复
    review_examples:
      - 表达过于概括，依据不足

  ai_quick_read_60s:
    name: AI 速读 60 秒
    scene: 研报详情页，仅对已签约用户展示，作用是节约阅读时间
    audience: 已签约用户
    hard_rules:
      - 总字数 <= 250
      - 必须包含固定四段结构：研究对象、核心结论、三大支撑、潜在风险
      - “三大支撑”必须恰好 3 条
      - 每条支撑 <= 30 字
      - “潜在风险”至少 1 条
      - 禁止出现套话
      - 不得出现高危敏感词，除非是原文已有且必须转述，此时标记 REVIEW
    semantic_rules:
      - 原文关键数据必须完整保留，不得修改、删除或编造
      - 原文核心风险必须保留，不得只写利好
      - 核心结论必须忠实原文
      - 支撑理由必须来自原文
      - 不得将研报观点改写成 App 对用户的投资建议
      - 如果原文有不确定表达，summary 应保留不确定性
    subjective_rules:
      - 是否真正节约阅读时间
      - 是否结构清晰
    must_include:
      - 研究对象
      - 核心结论
      - 三大支撑
      - 潜在风险
    must_not_include:
      - 综上所述
      - 本报告
      - 本文认为
      - 建议买入
      - 值得布局
    style:
      - 四段结构
      - 快速扫描
    risk_focus:
      - 容易遗漏风险
      - 容易改动关键数据
      - 容易把研报观点写成交易建议
    fail_examples:
      - 缺少“潜在风险”
    review_examples:
      - 出现“看好”，需要确认是否忠实转述

  structured_layout:
    name: AI 结构化排版
    scene: 研报详情页，仅对已签约用户展示，作用是节约阅读时间
    audience: 已签约用户
    hard_rules:
      - 必须包含小标题、分段、列表等结构化展示形态
      - 原文数字集合必须完全一致，不得新增、删除或修改数字
      - 原文实体名称集合必须完全一致，不得新增、删除或修改实体
      - 不得新增原文没有的敏感词
      - 不得新增高危投资建议词
    semantic_rules:
      - 零观点变动
      - 不得新增原文没有的信息性内容
      - 不得新增原文没有的判断、因果关系、投资观点或结论
      - 不得删减会影响理解的关键内容
      - 允许为排版目的添加序号、标题符号、换行、列表标记等结构 token
      - 不允许新增信息 token
    subjective_rules:
      - 结构是否清晰
      - 分段是否利于阅读
    must_include: []
    must_not_include:
      - 原文没有的实体
      - 原文没有的数字
      - 原文没有的因果关系
      - 原文没有的判断
    style:
      - 结构化整理
      - 不自由总结
    risk_focus:
      - 允许新增结构 token，不允许新增信息 token
      - 如果原文已有评级词或敏感词，summary 原样保留时标记 REVIEW
      - 如果 summary 新增评级词或敏感词，直接 FAIL
    fail_examples:
      - 原文没有 30%，summary 新增“利润增长 30%”
    review_examples:
      - 原文已有评级词，summary 仅结构化保留

  review_style_summary:
    name: 影评式总结
    scene: 用影评式语言评价研报的研究框架、逻辑和视角
    audience: 散户用户
    hard_rules:
      - 字数必须在 120 到 150 之间
      - 禁止出现任何数字，包括阿拉伯数字、中文数字、百分比、年份、金额、倍数
      - 禁止出现评级词：买入、增持、中性、减持、卖出、目标价、PE、PB、PS
      - 不得出现高危敏感词
    semantic_rules:
      - 内容应评价研究框架、分析逻辑、分析视角
      - 可以有观点，但观点只能评价研报写法、逻辑和视角
      - 不得评价股票是否值得买
      - 不得评价行业或公司是否值得投资
      - 不得把影评式表达变成投资建议
      - 不得编造原文没有的研究框架或逻辑
    subjective_rules:
      - 是否像影评
      - 是否不像官方新闻通稿
      - 是否有明确个人观点
    must_include: []
    must_not_include:
      - 数字
      - 买入
      - 增持
      - 中性
      - 减持
      - 卖出
      - 目标价
      - PE
      - PB
      - PS
    style:
      - 评价研报文本
      - 影评式语言
      - 不评价交易价值
    risk_focus:
      - 允许有观点，但观点对象必须是研报文本、分析框架、研究逻辑
      - 不允许把观点对象转移到股票、公司投资价值或交易行为
      - 禁数字是硬规则，出现任何数字都 FAIL
    fail_examples:
      - 这篇报告给出买入评级，逻辑完整。
    review_examples:
      - 文字像新闻通稿，不够像影评
